version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: medicompare-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: medicompare-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    container_name: medicompare-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/hospital
      - REDIS_URI=redis://redis:6379
      - ACCESS_TOKEN_SECRET=access_secret_123_xyz
      - REFRESH_TOKEN_SECRET=refresh_secret_987_abc
      - NODE_ENV=production
      - ALLOWED_CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ./hospital
    container_name: medicompare-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo-data:
  redis-data:
